<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1-Min English Speech Trainer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;700&display=swap');
        body { font-family: 'Inter', 'Noto Sans JP', sans-serif; background-color: #f0f2f5; }
        .timer-circle {
            transition: stroke-dashoffset 1s linear;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-2xl w-full bg-white rounded-3xl shadow-2xl overflow-hidden">
        <!-- Header -->
        <div class="bg-indigo-600 p-6 text-white text-center">
            <h1 class="text-2xl font-bold">1-Minute Speech Trainer</h1>
            <p class="text-indigo-100 text-sm">録音と文字起こしでスピーチを磨きましょう</p>
        </div>

        <div class="p-8">
            <!-- Warning for File Protocol -->
            <div id="protocolWarning" class="hidden mb-6 p-4 bg-amber-50 border border-amber-200 rounded-xl text-amber-800 text-sm">
                ⚠️ <strong>セキュリティ警告:</strong> <br>
                ファイルを直接開いているため、マイクが動作しない可能性があります。動作しない場合は、このファイルをブラウザの「HTTPS」環境（GitHub Pagesなど）にアップロードするか、ローカルサーバーで開いてください。
            </div>

            <!-- Error Message Display -->
            <div id="errorMessage" class="hidden mb-6 p-4 bg-red-50 border border-red-200 rounded-xl text-red-800 text-sm">
                <!-- エラーメッセージがここに表示されます -->
            </div>

            <!-- Timer Section -->
            <div class="flex flex-col items-center mb-8">
                <div class="relative w-48 h-48">
                    <svg class="w-full h-full">
                        <circle cx="96" cy="96" r="88" stroke="#e2e8f0" stroke-width="8" fill="transparent" />
                        <circle id="progressCircle" cx="96" cy="96" r="88" stroke="#4f46e5" stroke-width="8" fill="transparent" 
                            stroke-dasharray="552.92" stroke-dashoffset="0" class="timer-circle" />
                    </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                        <span id="timerText" class="text-5xl font-bold text-gray-800">60</span>
                        <span class="text-gray-400 text-sm font-semibold">SECONDS</span>
                    </div>
                </div>
            </div>

            <!-- Status Indicator -->
            <div id="statusLabel" class="text-center mb-6 font-bold text-gray-500 flex items-center justify-center gap-2">
                <span class="w-3 h-3 rounded-full bg-gray-300" id="statusDot"></span>
                <span id="statusText">Ready to start</span>
            </div>

            <!-- Speech to Text Output -->
            <div class="mb-8">
                <label class="block text-sm font-bold text-gray-600 mb-2">Transcription (文字起こし):</label>
                <div id="transcript" class="w-full h-32 p-4 bg-gray-50 border border-gray-200 rounded-xl overflow-y-auto text-gray-700 leading-relaxed italic">
                    録音を開始すると、ここにあなたのスピーチがテキスト表示されます...
                </div>
            </div>

            <!-- Audio Player (Hidden until recording ends) -->
            <div id="audioPlayerContainer" class="hidden mb-8 p-4 bg-indigo-50 rounded-xl border border-indigo-100">
                <p class="text-xs font-bold text-indigo-600 mb-2 uppercase tracking-wider">Review Recording:</p>
                <audio id="audioPlayback" controls class="w-full"></audio>
            </div>

            <!-- Main Controls -->
            <div class="grid grid-cols-2 gap-4">
                <button id="recordBtn" class="bg-red-500 hover:bg-red-600 text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2">
                    <span id="recordIcon">🎤</span> <span id="recordBtnText">Start Recording</span>
                </button>
                <button id="resetBtn" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-4 rounded-2xl transition-all active:scale-95">
                    Reset
                </button>
            </div>
        </div>

        <div class="bg-gray-50 p-4 text-center text-xs text-gray-400 border-t border-gray-100">
            ※Chromeなどの最新ブラウザでご利用ください。
        </div>
    </div>

    <script>
        const timerText = document.getElementById('timerText');
        const progressCircle = document.getElementById('progressCircle');
        const transcriptDiv = document.getElementById('transcript');
        const recordBtn = document.getElementById('recordBtn');
        const recordBtnText = document.getElementById('recordBtnText');
        const recordIcon = document.getElementById('recordIcon');
        const statusText = document.getElementById('statusText');
        const statusDot = document.getElementById('statusDot');
        const audioPlayerContainer = document.getElementById('audioPlayerContainer');
        const audioPlayback = document.getElementById('audioPlayback');
        const resetBtn = document.getElementById('resetBtn');
        const protocolWarning = document.getElementById('protocolWarning');
        const errorMessage = document.getElementById('errorMessage');

        let isRecording = false;
        let timeLeft = 60;
        let timerInterval;
        let recognition;
        let mediaRecorder;
        let audioChunks = [];

        // file:// プロトコルのチェック
        if (window.location.protocol === 'file:') {
            protocolWarning.classList.remove('hidden');
        }

        // エラー表示関数
        function showError(msg) {
            errorMessage.innerHTML = `<strong>エラー:</strong> ${msg}`;
            errorMessage.classList.remove('hidden');
            setTimeout(() => {
                errorMessage.classList.add('hidden');
            }, 8000);
        }

        // 音声認識の設定
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onresult = (event) => {
                let currentTranscript = '';
                for (let i = 0; i < event.results.length; i++) {
                    currentTranscript += event.results[i][0].transcript;
                }
                transcriptDiv.innerText = currentTranscript;
            };

            recognition.onerror = (event) => {
                console.error("Speech Recognition Error:", event.error);
                if (event.error === 'not-allowed') {
                    statusText.innerText = "Error: Mic access denied";
                }
            };
        } else {
            transcriptDiv.innerText = "お使いのブラウザは音声認識に対応していません。Chromeをご利用ください。";
        }

        // タイマー更新
        function updateTimer() {
            timeLeft--;
            timerText.innerText = timeLeft;
            const offset = 552.92 - (552.92 * (60 - timeLeft) / 60);
            progressCircle.style.strokeDashoffset = offset;
            if (timeLeft <= 0) stopRecording();
        }

        async function startRecording() {
            // マイクのサポートチェック
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                showError("このブラウザまたは環境（非HTTPS）ではマイクがサポートされていません。");
                return;
            }

            try {
                // デバイスが見つからないエラーに対処するため、制約を最小限にする
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        audioChunks.push(event.data);
                    }
                };

                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    const audioUrl = URL.createObjectURL(audioBlob);
                    audioPlayback.src = audioUrl;
                    audioPlayerContainer.classList.remove('hidden');
                    // ストリームを停止してマイク使用中マークを消す
                    stream.getTracks().forEach(track => track.stop());
                };

                mediaRecorder.start();
                if (recognition) {
                    try { recognition.start(); } catch(e) { console.error("Recognition start failed:", e); }
                }

                isRecording = true;
                timeLeft = 60;
                timerText.innerText = "60";
                progressCircle.style.strokeDashoffset = 0;
                
                statusText.innerText = "Recording...";
                statusDot.classList.replace('bg-gray-300', 'bg-red-500');
                statusDot.classList.add('animate-pulse');
                
                recordBtnText.innerText = "Stop Speech";
                recordBtn.classList.replace('bg-red-500', 'bg-gray-800');
                recordIcon.innerText = "⏹";

                timerInterval = setInterval(updateTimer, 1000);
            } catch (err) {
                console.error("Mic access error:", err);
                let msg = "マイクにアクセスできませんでした。";
                
                if (err.name === 'NotFoundError' || err.name === 'Requested device not found') {
                    msg = "有効なマイクが見つかりません。マイクが正しく接続されているか、PCの設定でマイクが有効になっているか確認してください。";
                } else if (err.name === 'NotAllowedError') {
                    msg = "ブラウザでマイクの許可が拒否されました。アドレスバーのアイコンから許可を有効にしてください。";
                } else if (window.location.protocol === 'file:') {
                    msg = "ファイルを直接開いているため制限されています。Webサーバー上で実行してください。";
                }
                
                showError(msg);
            }
        }

        function stopRecording() {
            clearInterval(timerInterval);
            if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
            if (recognition) {
                try { recognition.stop(); } catch(e) { console.error(e); }
            }

            isRecording = false;
            statusText.innerText = "Finished";
            statusDot.classList.remove('animate-pulse');
            statusDot.classList.replace('bg-red-500', 'bg-green-500');
            
            recordBtnText.innerText = "Record Again";
            recordBtn.classList.replace('bg-gray-800', 'bg-indigo-600');
            recordIcon.innerText = "🔄";
        }

        recordBtn.addEventListener('click', () => {
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        });

        resetBtn.addEventListener('click', () => {
            location.reload();
        });
    </script>
</body>
</html>
